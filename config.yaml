modes:
  - bare
  - custom

timeouts:
  easy: 900        # 15 min
  medium: 1800     # 30 min
  hard: 3600       # 1 hr

trials:
  pilot: 3
  final: 5

limits:
  max_cost_usd_per_task: 5.00    # hard stop per run
  max_steps_per_task: 200        # soft limit (for analysis, not enforced)

scoring:
  # CTF-style scoring: base_points x time_bonus x cost_multiplier
  difficulty_points:
    easy: 100
    medium: 200
    hard: 400
  time_bonus_weight: 0.5         # max +50% bonus for instant solve
  cost_floor: 0.5                # minimum cost multiplier (never below 50%)
  # Normalized score scale: 0-1000 (perfect = all tasks solved instantly at zero cost)

runner:
  parallel_containers: 4         # docker semaphore
  # Each container uses ~1-2 GB RAM (target + agent)
  # Account for OpenRouter API rate limits

agent_overrides:
  strip_model_frontmatter: true  # subagent inherits primary model
  # temperature: keep original from agents (well-tuned for CTF work)

docker:
  image: ctfbase-bench
  network_whitelist: true
  stop_timeout: 10               # grace period before SIGKILL
  watchdog_grace: 30             # extra seconds after timeout before force-kill
